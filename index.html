  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #252540;
      --accent: #7c6fff; --accent2: #ff6fa8;
      --text: #f0f0ff; --text2: #9090b0;
      --border: rgba(255,255,255,0.08); --radius: 16px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh; display: flex; flex-direction: column;
      max-width: 430px; margin: 0 auto; overflow-x: hidden;
    }
    .tab-bar {
      display: flex; background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 8px; position: sticky; top: 0; z-index: 10;
    }
    .tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px; padding: 12px 8px;
      font-size: 11px; color: var(--text2); cursor: pointer;
      border: none; background: none;
      border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s;
    }
    .tab svg { width: 22px; height: 22px; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .screen { display: none; flex: 1; padding: 20px 16px 100px; }
    .screen.active { display: flex; flex-direction: column; gap: 16px; }

    /* Calculator */
    .calc-display {
      background: var(--surface); border-radius: var(--radius);
      padding: 20px 24px; border: 1px solid var(--border);
      min-height: 120px; display: flex; flex-direction: column;
      justify-content: flex-end; align-items: flex-end;
    }
    .calc-expr { font-size: 16px; color: var(--text2); min-height: 22px; word-break: break-all; }
    .calc-result { font-size: 52px; font-weight: 300; letter-spacing: -2px; word-break: break-all; line-height: 1.1; }
    .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .btn {
      height: 72px; border-radius: 14px; font-size: 20px; font-weight: 400;
      border: 1px solid var(--border); cursor: pointer;
      transition: transform 0.08s, opacity 0.1s;
      background: var(--surface); color: var(--text);
    }
    .btn:active { transform: scale(0.93); opacity: 0.75; }
    .btn.op { background: var(--surface2); color: var(--accent); }
    .btn.eq { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; font-size: 24px; }
    .btn.clear { color: var(--accent2); }
    .btn.zero { grid-column: span 2; border-radius: 36px; text-align: left; padding-left: 28px; }

    /* Weather */
    .search-row { display: flex; gap: 8px; }
    .search-row input {
      flex: 1; padding: 14px 16px; border-radius: 14px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 16px; outline: none;
    }
    .search-row input:focus { border-color: var(--accent); }
    .search-row input::placeholder { color: var(--text2); }
    .search-btn {
      width: 52px; height: 52px; border-radius: 14px; border: none;
      background: var(--accent); color: #fff; font-size: 20px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .weather-card { background: var(--surface); border-radius: var(--radius); padding: 24px; border: 1px solid var(--border); }
    .weather-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .weather-city { font-size: 20px; font-weight: 600; }
    .weather-date { font-size: 13px; color: var(--text2); margin-top: 3px; }
    .weather-icon-big { font-size: 56px; }
    .weather-temp-big { font-size: 72px; font-weight: 200; letter-spacing: -3px; line-height: 1; margin: 8px 0 4px; }
    .weather-desc { font-size: 16px; color: var(--text2); }
    .weather-divider { height: 1px; background: var(--border); margin: 20px 0; }
    .weather-details { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .weather-detail { background: var(--surface2); border-radius: 12px; padding: 14px; }
    .weather-detail-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .weather-detail-val { font-size: 20px; font-weight: 500; }
    .weather-hint { text-align: center; color: var(--text2); font-size: 15px; padding: 40px 0; }
    .weather-hint span { display: block; font-size: 40px; margin-bottom: 12px; }
    .weather-loading { text-align: center; padding: 40px 0; color: var(--text2); }
    .weather-error { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); border-radius: 14px; padding: 16px; color: #ff8080; font-size: 14px; text-align: center; }

    .ts-tab-bar {
      display: flex; background: var(--surface2); border-radius: 14px; padding: 4px; gap: 4px;
    }
    .ts-tab {
      flex: 1; padding: 10px; border-radius: 10px; border: none;
      background: none; color: var(--text2); font-size: 15px; cursor: pointer; transition: all 0.2s;
    }
    .ts-tab.active { background: var(--accent); color: #fff; }
    .ts-panel { display: none; flex-direction: column; align-items: center; gap: 20px; }
    .ts-panel.active { display: flex; }
    .ts-display {
      font-size: 72px; font-weight: 200; letter-spacing: -3px; text-align: center;
      font-variant-numeric: tabular-nums; line-height: 1; padding: 20px 0 10px;
    }
    .ts-display.running { color: var(--accent); }
    .ts-ms { font-size: 36px; color: var(--text2); }
    .ts-btn-row { display: flex; gap: 14px; justify-content: center; }
    .ts-btn {
      width: 80px; height: 80px; border-radius: 50%; border: none;
      font-size: 15px; cursor: pointer; font-weight: 500;
      transition: transform 0.1s, opacity 0.1s;
    }
    .ts-btn:active { transform: scale(0.92); opacity: 0.8; }

      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text); font-size: 32px; font-weight: 300;
      text-align: center; outline: none; font-variant-numeric: tabular-nums;
    }
    .timer-digit:focus { border-color: var(--accent); }
    .timer-colon { font-size: 32px; color: var(--text2); margin-bottom: 20px; }
    .timer-progress {
      width: 100%; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden;
    }

      height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));

<script>
// ===== Tab =====
function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

// ===== Calculator =====
let state = { display: '0', expr: '', op: null, prev: null, reset: false };
function updateCalc() {
  document.getElementById('result').textContent = state.display;
  document.getElementById('expr').textContent = state.expr;
}
function calcNum(n) {
  if (state.reset) { state.display = n; state.reset = false; }
  else state.display = state.display === '0' ? n : state.display + n;
  updateCalc();
}
function calcDot() {
  if (state.reset) { state.display = '0.'; state.reset = false; return updateCalc(); }
  if (!state.display.includes('.')) state.display += '.';
  updateCalc();
}
function calcOp(op) {
  const cur = parseFloat(state.display);
  if (state.op && !state.reset) {
    const res = compute(state.prev, cur, state.op);
    state.display = fmt(res); state.prev = res;
  } else { state.prev = cur; }
  state.op = op;
  state.expr = state.display + ' ' + sym(op);
  state.reset = true; updateCalc();
}
function calcEqual() {
  if (!state.op) return;
  const res = compute(state.prev, parseFloat(state.display), state.op);
  state.expr = ''; state.display = fmt(res);
  state.op = null; state.prev = null; state.reset = true; updateCalc();
}
function compute(a, b, op) {
  if (op === '+') return a + b;
  if (op === '-') return a - b;
  if (op === '*') return a * b;
  if (op === '/') return b !== 0 ? a / b : 0;
}
function fmt(n) { return !isFinite(n) ? 'Error' : parseFloat(n.toPrecision(10)).toString(); }
function sym(op) { return op === '*' ? '×' : op === '/' ? '÷' : op; }
function calcClear() { state = { display: '0', expr: '', op: null, prev: null, reset: false }; updateCalc(); }
function calcSign() { state.display = fmt(parseFloat(state.display) * -1); updateCalc(); }
function calcPercent() { state.display = fmt(parseFloat(state.display) / 100); updateCalc(); }

// ===== Weather =====
const wmoMap = {0:'Clear',1:'Clear',2:'Clouds',3:'Clouds',51:'Drizzle',53:'Drizzle',55:'Drizzle',61:'Rain',63:'Rain',65:'Rain',71:'Snow',73:'Snow',75:'Snow',80:'Rain',81:'Rain',82:'Rain',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};
const descMap = {Clear:'맑음',Clouds:'흐림',Drizzle:'이슬비',Rain:'비',Snow:'눈',Thunderstorm:'천둥번개',Mist:'안개'};
const wIcons = {Clear:'☀️',Clouds:'☁️',Rain:'🌧️',Drizzle:'🌦️',Thunderstorm:'⛈️',Snow:'❄️',Mist:'🌫️'};

async function fetchWeather() {
  const city = document.getElementById('city-input').value.trim();
  if (!city) return;
  const el = document.getElementById('weather-result');
  el.innerHTML = '<div class="weather-loading">⏳ 불러오는 중...</div>';
  try {
    const geoRes = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(city) + '&count=1&language=ko');
    const geoData = await geoRes.json();
    if (!geoData.results || !geoData.results.length) throw new Error('도시를 찾을 수 없어요');
    const { latitude, longitude, name, country } = geoData.results[0];
    const wRes = await fetch('https://api.open-meteo.com/v1/forecast?latitude=' + latitude + '&longitude=' + longitude + '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&timezone=auto');
    const wData = await wRes.json();
    const c = wData.current;
    const condition = wmoMap[c.weather_code] || 'Clouds';
    const icon = wIcons[condition] || '🌤️';
    const desc = descMap[condition] || '흐림';
    const dateStr = new Date().toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
    el.innerHTML = `<div class="weather-card">
      <div class="weather-header">
        <div><div class="weather-city">📍 ${name}, ${country}</div><div class="weather-date">${dateStr}</div></div>
        <div class="weather-icon-big">${icon}</div>
      </div>
      <div class="weather-temp-big">${Math.round(c.temperature_2m)}°</div>
      <div class="weather-desc">${desc}</div>
      <div class="weather-divider"></div>
      <div class="weather-details">
        <div class="weather-detail"><div class="weather-detail-label">체감온도</div><div class="weather-detail-val">${Math.round(c.apparent_temperature)}°C</div></div>
        <div class="weather-detail"><div class="weather-detail-label">습도</div><div class="weather-detail-val">${c.relative_humidity_2m}%</div></div>
        <div class="weather-detail"><div class="weather-detail-label">풍속</div><div class="weather-detail-val">${Math.round(c.wind_speed_10m)} km/h</div></div>
        <div class="weather-detail"><div class="weather-detail-label">날씨</div><div class="weather-detail-val">${icon} ${desc}</div></div>
      </div>
    </div>`;
  } catch(e) {
    el.innerHTML = '<div class="weather-error">⚠️ ' + (e.message || '오류 발생') + '<br><small>영어로 입력해보세요 (예: Seoul, Tokyo)</small></div>';
  }
}

// ===== Timer / Stopwatch =====
function switchTsTab(which) {
  document.querySelectorAll('.ts-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.ts-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('ts-tab-' + which).classList.add('active');
  document.getElementById('ts-' + which).classList.add('active');
}

// --- Timer ---
let timerTotal = 0, timerRemain = 0, timerRunning = false, timerInterval = null;

function timerStartStop() {
  if (!timerRunning) {
    // 처음 시작 시 입력값 읽기
    if (timerRemain === 0) {
      const hh = parseInt(document.getElementById('t-hh').value) || 0;
      const mm = parseInt(document.getElementById('t-mm').value) || 0;
      const ss = parseInt(document.getElementById('t-ss').value) || 0;
      timerTotal = hh * 3600 + mm * 60 + ss;
      timerRemain = timerTotal;
      if (timerRemain === 0) { alert('시간을 입력해주세요'); return; }
      document.getElementById('timer-input-area').style.display = 'none';
      document.getElementById('timer-display').style.display = 'block';
      document.getElementById('timer-progress-wrap').style.display = 'block';
    }
    timerRunning = true;
    document.getElementById('timer-start-btn').textContent = '일시정지';
    document.getElementById('timer-start-btn').className = 'ts-btn stop';
    timerInterval = setInterval(() => {
      timerRemain--;
      timerUpdateDisplay();
      if (timerRemain <= 0) { timerDone(); }
    }, 1000);
  } else {
    timerRunning = false;
    clearInterval(timerInterval);
    document.getElementById('timer-start-btn').textContent = '계속';
    document.getElementById('timer-start-btn').className = 'ts-btn start';
  }
}

function timerUpdateDisplay() {
  const h = Math.floor(timerRemain / 3600);
  const m = Math.floor((timerRemain % 3600) / 60);
  const s = timerRemain % 60;
  const txt = (h > 0 ? pad(h)+':' : '') + pad(m) + ':' + pad(s);
  document.getElementById('timer-display').textContent = txt;
  const pct = timerTotal > 0 ? (timerRemain / timerTotal * 100) : 0;
  document.getElementById('timer-progress-bar').style.width = pct + '%';
}

function timerDone() {
  timerRunning = false;
  clearInterval(timerInterval);
  timerRemain = 0;
  timerUpdateDisplay();
  document.getElementById('timer-start-btn').textContent = '시작';
  document.getElementById('timer-start-btn').className = 'ts-btn start';
  // 소리
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.35, 0.7].forEach(t => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value = 660; osc.type = 'sine';
      g.gain.setValueAtTime(0.5, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.3);
      osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.3);
    });
  } catch(e) {}
  document.getElementById('timer-display').style.color = 'var(--accent2)';
  setTimeout(() => { document.getElementById('timer-display').style.color = ''; }, 1500);
}

function timerReset() {
  timerRunning = false;
  clearInterval(timerInterval);
  timerRemain = 0; timerTotal = 0;
  document.getElementById('timer-input-area').style.display = 'flex';
  document.getElementById('timer-display').style.display = 'none';
  document.getElementById('timer-progress-wrap').style.display = 'none';
  document.getElementById('timer-start-btn').textContent = '시작';
  document.getElementById('timer-start-btn').className = 'ts-btn start';
  document.getElementById('t-hh').value = 0;
  document.getElementById('t-mm').value = 0;
  document.getElementById('t-ss').value = 0;
}

// --- Stopwatch ---
let swRunning = false, swStart = 0, swElapsed = 0, swInterval = null;
let swLaps = [];

function swStartStop() {
  if (!swRunning) {
    swRunning = true;
    swStart = Date.now() - swElapsed;
    swInterval = setInterval(swTick, 30);
    document.getElementById('sw-start-btn').textContent = '정지';
    document.getElementById('sw-start-btn').className = 'ts-btn stop';
    document.getElementById('sw-lap-btn').disabled = false;
    document.getElementById('sw-display').classList.add('running');
  } else {
    swRunning = false;
    swElapsed = Date.now() - swStart;
    clearInterval(swInterval);
    document.getElementById('sw-start-btn').textContent = '계속';
    document.getElementById('sw-start-btn').className = 'ts-btn start';
    document.getElementById('sw-display').classList.remove('running');
  }
}

function swTick() {
  swElapsed = Date.now() - swStart;
  swUpdateDisplay();
}

function swUpdateDisplay() {
  const ms = swElapsed % 1000;
  const s  = Math.floor(swElapsed / 1000) % 60;
  const m  = Math.floor(swElapsed / 60000) % 60;
  const h  = Math.floor(swElapsed / 3600000);
  const timeStr = (h > 0 ? pad(h)+':' : '') + pad(m) + ':' + pad(s);
  document.getElementById('sw-display').innerHTML = timeStr + '<span class="ts-ms">.' + pad(Math.floor(ms/10)) + '</span>';
}

function swLap() {
  if (!swRunning) return;
  const lapTime = swElapsed;
  const prev = swLaps.length ? swLaps[swLaps.length-1].cumul : 0;
  swLaps.push({ n: swLaps.length+1, split: lapTime - prev, cumul: lapTime });
  swRenderLaps();
}

function swRenderLaps() {
  if (!swLaps.length) { document.getElementById('lap-list').innerHTML = ''; return; }
  const splits = swLaps.map(l => l.split);
  const best = Math.min(...splits), worst = Math.max(...splits);
  document.getElementById('lap-list').innerHTML = [...swLaps].reverse().map(l => {
    let cls = '';
    if (swLaps.length > 1 && l.split === best)  cls = 'lap-best';
    if (swLaps.length > 1 && l.split === worst) cls = 'lap-worst';
    return `<div class="lap-item">
      <span class="lap-num">랩 ${l.n}</span>
      <span class="${cls}">${fmtMs(l.split)}</span>
      <span style="color:var(--text2)">${fmtMs(l.cumul)}</span>
    </div>`;
  }).join('');
}

function swReset() {
  swRunning = false;
  clearInterval(swInterval);
  swElapsed = 0; swStart = 0; swLaps = [];
  swUpdateDisplay();
  document.getElementById('sw-start-btn').textContent = '시작';
  document.getElementById('sw-start-btn').className = 'ts-btn start';
  document.getElementById('sw-lap-btn').disabled = true;
  document.getElementById('sw-display').classList.remove('running');
  document.getElementById('lap-list').innerHTML = '';
}

function pad(n) { return String(n).padStart(2,'0'); }
function fmtMs(ms) {
  const s = Math.floor(ms/1000)%60, m = Math.floor(ms/60000)%60, h = Math.floor(ms/3600000);
  const cs = Math.floor((ms%1000)/10);
  return (h>0?pad(h)+':':'') + pad(m)+':'+pad(s)+'.'+pad(cs);
}

// ===== PWA =====
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});
async function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').style.display = 'none';
}
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then((reg) => {
    // 백그라운드에서 새 서비스 워커가 업데이트되었는지 감시
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      if (newWorker) {
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            console.log('새 버전 발견! 자동으로 페이지를 갱신합니다.');
            window.location.reload();
          }
        });
      }
    });
  });

  // 서비스 워커가 바뀌면 화면을 싹 새로고침
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) {
      refreshing = true;
      window.location.reload();
    }
  });
}
